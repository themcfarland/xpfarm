<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{block "title" .}}XPFarm{{end}}</title>
    <link rel="icon" href="/favicon.ico">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-body: #050505;
            --bg-sidebar: #0a0a0a;
            --bg-card: #0f1115;
            --bg-hover: #161b22;
            --color-text: #e2e8f0;
            --color-muted: #94a3b8;
            --color-primary: #8b5cf6;
            --color-secondary: #10b981;
            --border-color: #1e1e1e;
        }

        * {
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg-body);
            color: var(--color-text);
            margin: 0;
            display: flex;
            height: 100vh;
            overflow: hidden;
        }

        .sidebar {
            width: 300px;
            background-color: var(--bg-sidebar);
            border-right: 1px solid var(--border-color);
            display: flex;
            flex-direction: column;
            padding: 20px;
            flex-shrink: 0;
            overflow-y: auto;
        }

        .logo {
            font-size: 1.5rem;
            font-weight: 700;
            color: var(--color-primary);
            margin-bottom: 30px;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .logo span {
            color: var(--color-text);
        }

        .nav-links {
            list-style: none;
            padding: 0;
            margin: 0;
            flex-grow: 1;
        }

        .nav-item {
            margin-bottom: 5px;
        }

        .nav-link {
            display: block;
            padding: 10px 15px;
            border-radius: 6px;
            color: var(--color-muted);
            text-decoration: none;
            transition: all 0.2s;
            font-weight: 500;
        }

        .nav-link:hover,
        .nav-link.active {
            background-color: var(--bg-hover);
            color: var(--color-text);
        }

        .nav-link.active {
            color: var(--color-primary);
            border-left: 3px solid var(--color-primary);
        }

        /* Dropdown Styles */
        details {
            margin-bottom: 5px;
        }

        summary {
            padding: 10px 15px;
            border-radius: 6px;
            color: var(--color-muted);
            font-weight: 500;
            cursor: pointer;
            list-style: none;
            /* Hide default triangle */
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        summary:hover,
        summary.active {
            background-color: var(--bg-hover);
            color: var(--color-text);
        }

        summary::-webkit-details-marker {
            display: none;
        }

        summary::after {
            content: '+';
            font-size: 1.2em;
            font-weight: 300;
        }

        details[open] summary::after {
            content: '-';
        }

        .sub-menu {
            padding-left: 20px;
            margin-top: 5px;
        }

        .sub-link {
            display: block;
            padding: 8px 15px;
            border-radius: 6px;
            color: var(--color-muted);
            text-decoration: none;
            font-size: 0.9rem;
            margin-bottom: 2px;
        }

        .sub-link:hover {
            color: var(--color-text);
            background-color: rgba(255, 255, 255, 0.03);
        }

        .sub-link.active {
            color: var(--color-secondary);
        }

        .nested-details {
            margin-left: 10px;
            border-left: 1px solid var(--border-color);
        }

        .nested-summary {
            padding: 8px 15px;
            font-size: 0.9rem;
        }

        .main-content {
            flex-grow: 1;
            overflow-y: auto;
            padding: 30px;
            display: flex;
            flex-direction: column;
        }

        h1 {
            font-size: 1.8rem;
            margin: 0 0 20px 0;
            font-weight: 600;
        }

        h2 {
            font-size: 1.4rem;
            margin: 25px 0 15px 0;
            color: var(--color-text);
        }

        .card {
            background-color: var(--bg-card);
            border: 1px solid var(--border-color);
            border-radius: 8px;
            padding: 20px;
            margin-bottom: 20px;
        }

        .btn {
            display: inline-block;
            padding: 10px 20px;
            border-radius: 6px;
            font-weight: 600;
            text-decoration: none;
            cursor: pointer;
            border: none;
            transition: background 0.2s;
            font-size: 0.9rem;
        }

        .btn-primary {
            background-color: var(--color-primary);
            color: white;
        }

        .btn-primary:hover {
            background-color: #7c3aed;
        }

        .btn-secondary {
            background-color: var(--color-secondary);
            color: #000;
        }

        table {
            width: 100%;
            border-collapse: collapse;
        }

        th,
        td {
            text-align: left;
            padding: 15px;
            border-bottom: 1px solid var(--border-color);
        }

        th {
            color: var(--color-muted);
            font-weight: 600;
            font-size: 0.85rem;
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }

        tr:last-child td {
            border-bottom: none;
        }

        tr:hover {
            background-color: rgba(255, 255, 255, 0.02);
        }

        .badge {
            display: inline-block;
            padding: 3px 8px;
            border-radius: 4px;
            font-size: 0.75rem;
            font-weight: 600;
        }

        .badge-cf {
            background-color: rgba(245, 158, 11, 0.2);
            color: #fbbf24;
            border: 1px solid rgba(245, 158, 11, 0.3);
        }

        .badge-id {
            background-color: rgba(148, 163, 184, 0.2);
            color: #cbd5e1;
        }

        input[type="text"],
        textarea,
        select {
            width: 100%;
            padding: 10px 12px;
            background-color: #050505;
            border: 1px solid var(--border-color);
            border-radius: 6px;
            color: white;
            outline: none;
            transition: border 0.2s;
            font-family: 'Inter', sans-serif;
        }

        input[type="text"]:focus,
        textarea:focus,
        select:focus {
            border-color: var(--color-primary);
        }

        /* File Input Styling */
        input[type="file"] {
            background-color: #050505;
            padding: 10px;
            border-radius: 6px;
            border: 1px solid var(--border-color);
            color: var(--color-muted);
            cursor: pointer;
        }

        input[type="file"]::-webkit-file-upload-button {
            background-color: var(--bg-hover);
            color: var(--color-text);
            border: 1px solid var(--border-color);
            padding: 5px 10px;
            border-radius: 4px;
            margin-right: 10px;
            cursor: pointer;
            transition: all 0.2s;
        }

        input[type="file"]::-webkit-file-upload-button:hover {
            background-color: var(--color-primary);
            border-color: var(--color-primary);
            color: white;
        }

        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }

        .stat-card {
            background: var(--bg-card);
            padding: 20px;
            border-radius: 8px;
            border: 1px solid var(--border-color);
        }

        .stat-value {
            font-size: 2rem;
            font-weight: 700;
            color: var(--color-text);
            margin-bottom: 5px;
        }

        .stat-label {
            color: var(--color-muted);
            font-size: 0.9rem;
        }
    </style>
</head>

<body>
    <div class="sidebar">
        <div class="logo">XP<span>FARM</span></div>
        <div class="nav-links">
            <!-- Dashboard -->
            <a href="/" class="nav-link {{if eq .Page `dashboard`}}active{{end}}">Dashboard</a>

            <!-- Assets Dropdown -->
            <details id="nav-assets" {{if eq .Page `assets`}}open{{end}}>
                <summary>Assets & Targets</summary>
                <div class="sub-menu">
                    <a href="/assets" class="sub-link" style="color: var(--color-primary); font-weight: 600;">All
                        Assets</a>
                    {{range .SidebarAssets}}
                    <details class="nested-details" id="nav-asset-{{.ID}}">
                        <summary class="nested-summary">{{.Name}}</summary>
                        <div class="sub-menu">
                            <a href="/asset/{{.ID}}" class="sub-link" style="font-style: italic;">Overview</a>
                            {{range .Targets}}
                            <a href="/target/{{.ID}}" class="sub-link">{{.Value}}</a>
                            {{end}}
                        </div>
                    </details>
                    {{end}}
                </div>
            </details>

            <!-- Overlord (Coming Soon) -->
            <a href="/overlord" class="nav-link {{if eq .Page `overlord`}}active{{end}}">Overlord</a>

            <!-- Separator -->
            <hr style="border: 0; border-top: 1px solid var(--border-color); margin: 15px 0;">

            <!-- Modules -->
            <a href="/modules" class="nav-link {{if eq .Page `modules`}}active{{end}}">Modules</a>

            <!-- Settings Dropdown -->
            <details id="nav-settings" {{if eq .Page `settings`}}open{{end}}>
                <summary>Settings</summary>
                <div class="sub-menu">
                    <a href="/settings?tab=env" class="sub-link">Environment Variables</a>
                    <a href="/settings?tab=discord" class="sub-link">Discord Integration</a>
                    <a href="/settings?tab=telegram" class="sub-link">Telegram Integration</a>
                </div>
            </details>
        </div>
    </div>

    <script>
        // Persist Dropdown State
        document.addEventListener("DOMContentLoaded", function () {
            const details = document.querySelectorAll("details[id]");

            details.forEach((el) => {
                // Restore state
                const id = el.id;
                const state = localStorage.getItem("details-" + id);
                if (state === "open") {
                    el.setAttribute("open", "");
                } else if (state === "closed") {
                    // Only force close if explicitly closed by user (override server default)
                    // However, server default is helpful for context.
                    // Strategy: LocalStorage wins if present.
                    el.removeAttribute("open");
                }

                // Save state on toggle
                el.addEventListener("toggle", (e) => {
                    if (el.open) {
                        localStorage.setItem("details-" + id, "open");
                    } else {
                        localStorage.setItem("details-" + id, "closed");
                    }
                });
            });
        });
    </script>

    <div class="main-content">
        {{template "content" .}}
    </div>
</body>

</html>
